<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cognifyz | Task 6: Secure Registration</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="registration-wrapper">
    <form id="mainForm" class="auth-form" novalidate>
      <div class="form-header">
        <h2>Create Account</h2>
        <p>Enter your details to get started.</p>
      </div>

      <div class="input-container" id="nameGroup">
        <label for="username">Full Name</label>
        <input type="text" id="username" placeholder="e.g. Alex Johnson">
        <i class="status-icon"></i>
        <small class="error-msg">Error message goes here</small>
      </div>

      <div class="input-container" id="emailGroup">
        <label for="email">Email Address</label>
        <input type="email" id="email" placeholder="alex.j@example.com">
        <i class="status-icon"></i>
        <small class="error-msg">Error message goes here</small>
      </div>

      <div class="input-container" id="passwordGroup">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="At least 8 characters">
        <i class="status-icon"></i>
        <small class="error-msg">Error message goes here</small>
      </div>

      <button type="submit" class="btn-submit">Sign Up</button>
      <p id="formSuccess" class="success-banner hidden">Registration successful! ✅</p>
    </form>
  </div>

  <script src="script.js"></script>
</body>
</html>
